<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pokémon Cards</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Ícones -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

    <!-- Fundo -->
    <div class="background"></div>

    <!-- Pokébolas decorativas -->
    <div class="pokebolas">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Cabeçalho -->

    <header>

        <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg"
            class="logo">

        <h1>Escolha seu Pokémon</h1>

        <p>Conheça alguns dos Pokémon mais famosos da franquia.</p>

    </header>

    <!-- Cards -->

    <section class="container">

        <!-- CHARIZARD -->

        <div class="card">

            <div class="card-img">

                <img src="charizard.png" alt="Charizard">

            </div>

            <button class="titulo">
                Charizard
            </button>

            <div class="linha"></div>

            <div class="botoes">

                <button class="btn saber">
                    <i class="fa-solid fa-book-open"></i>
                    Saber Mais
                </button>

                <button class="btn contato">
                    <i class="fa-solid fa-envelope"></i>
                    Contato
                </button>

            </div>

        </div>

        <!-- PIKACHU -->

        <div class="card">

            <div class="card-img">

                <img src="pikachu.png" alt="Pikachu">

            </div>

            <button class="titulo">
                Pikachu
            </button>

            <div class="linha"></div>

            <div class="botoes">

                <button class="btn saber">
                    <i class="fa-solid fa-book-open"></i>
                    Saber Mais
                </button>

                <button class="btn contato">
                    <i class="fa-solid fa-envelope"></i>
                    Contato
                </button>

            </div>

        </div>

        <!-- MEWTWO -->

        <div class="card">

            <div class="card-img">

                <img src="mewtwo.png" alt="Mewtwo">

            </div>

            <button class="titulo">
                Mewtwo
            </button>

            <div class="linha"></div>

            <div class="botoes">

                <button class="btn saber">
                    <i class="fa-solid fa-book-open"></i>
                    Saber Mais
                </button>

                <button class="btn contato">
                    <i class="fa-solid fa-envelope"></i>
                    Contato
                </button>

            </div>

        </div>

    </section>

    <footer>

        <p>Pokémon © Nintendo • Game Freak • Creatures</p>

    </footer>

</body>

</html>
